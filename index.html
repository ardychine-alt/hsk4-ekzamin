<style>
:root{
  --bg:#F7F4EF;--dark:#1A1208;--red:#D94F2B;--gold:#C8872A;--green:#2E7D4F;
  --card:#FFFFFF;--muted:#9A8F82;--border:#E8E0D5;--ink:#2C2318;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* HEADER */
.header{background:var(--dark);padding:32px 20px 24px;position:relative;overflow:hidden;}
.header::after{content:'考试';position:absolute;right:-10px;top:-8px;font-family:'Noto Sans SC',sans-serif;font-size:100px;color:rgba(255,255,255,.04);font-weight:700;pointer-events:none;}
.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.h-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:white;line-height:1.1;}
.h-title span{color:var(--gold);}
.h-badge{background:rgba(200,135,42,.15);border:1px solid rgba(200,135,42,.3);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--gold);font-weight:500;letter-spacing:.5px;}
.score-row{display:flex;gap:16px;}
.sc-item{text-align:center;}
.sc-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:white;}
.sc-lbl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.5px;margin-top:1px;}

/* PROGRESS BAR */
.pbar-wrap{background:rgba(255,255,255,.08);height:4px;margin:16px 20px 0;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));transition:width .5s ease;}

/* MAIN */
.main{padding:20px 16px 100px;}

/* QUESTION CARD */
.qcard{background:var(--card);border-radius:20px;padding:24px;margin-bottom:16px;border:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.06);position:relative;overflow:hidden;}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold));}
.q-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;font-weight:500;}
.q-word{font-family:'Noto Sans SC',sans-serif;font-size:48px;font-weight:700;color:var(--dark);line-height:1;margin-bottom:6px;text-align:center;}
.q-pinyin{font-size:16px;color:var(--gold);text-align:center;margin-bottom:4px;font-style:italic;}
.q-meaning{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px;}
.q-type{display:inline-block;background:rgba(217,79,43,.08);border:1px solid rgba(217,79,43,.15);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--red);margin:0 auto 20px;display:block;width:fit-content;margin:0 auto 20px;}

/* INPUT AREA */
.input-area{position:relative;}
.answer-input{width:100%;background:#F9F6F2;border:2px solid var(--border);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--ink);font-family:'Noto Sans SC',sans-serif;resize:none;outline:none;transition:border-color .2s;min-height:80px;line-height:1.5;}
.answer-input:focus{border-color:var(--red);}
.answer-input::placeholder{color:#C5BBB0;font-family:'DM Sans',sans-serif;font-size:14px;}
.char-hint{font-size:11px;color:var(--muted);margin-top:6px;text-align:right;}

/* SUBMIT BTN */
.submit-btn{width:100%;background:var(--dark);color:white;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;margin-top:14px;transition:transform .15s,opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.submit-btn:active{transform:scale(.97);opacity:.9;}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;}
.submit-btn.loading{background:#555;}

/* FEEDBACK CARD */
.feedback{background:var(--card);border-radius:16px;padding:18px;margin-bottom:16px;border:2px solid var(--border);display:none;animation:slideUp .3s ease;}
.feedback.show{display:block;}
.feedback.correct{border-color:var(--green);background:rgba(46,125,79,.04);}
.feedback.partial{border-color:var(--gold);background:rgba(200,135,42,.04);}
.feedback.wrong{border-color:var(--red);background:rgba(217,79,43,.04);}
.fb-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.fb-icon{font-size:24px;}
.fb-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.fb-score{margin-left:auto;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.feedback.correct .fb-score{color:var(--green);}
.feedback.partial .fb-score{color:var(--gold);}
.feedback.wrong .fb-score{color:var(--red);}
.fb-text{font-size:13px;color:var(--ink);line-height:1.6;margin-bottom:10px;}
.fb-example{background:#F3EFE9;border-radius:10px;padding:12px;margin-top:10px;}
.fb-ex-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.fb-ex-zh{font-family:'Noto Sans SC',sans-serif;font-size:15px;color:var(--dark);margin-bottom:3px;}
.fb-ex-en{font-size:12px;color:var(--muted);}

/* NEXT BTN */
.next-btn{width:100%;background:linear-gradient(135deg,var(--red),var(--gold));color:white;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:transform .15s,opacity .15s;display:none;}
.next-btn.show{display:block;}
.next-btn:active{transform:scale(.97);}

/* LESSON SELECTOR */
.lesson-sel{background:var(--card);border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid var(--border);}
.ls-title{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.ls-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.ls-btn{padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;font-family:'Syne',sans-serif;}
.ls-btn.active{background:var(--dark);color:white;border-color:var(--dark);}
.ls-btn:active{transform:scale(.94);}

/* RESULT SCREEN */
.result-screen{display:none;text-align:center;padding:40px 20px;}
.result-screen.show{display:block;}
.result-big{font-family:'Syne',sans-serif;font-size:72px;font-weight:800;line-height:1;margin-bottom:8px;}
.result-sub{font-size:16px;color:var(--muted);margin-bottom:32px;}
.result-grade{display:inline-block;padding:8px 24px;border-radius:30px;font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:24px;}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;}
.rs{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);}
.rs-n{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;}
.rs-l{font-size:11px;color:var(--muted);margin-top:2px;}
.restart-btn{width:100%;background:var(--dark);color:white;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;}

/* LOADING DOTS */
.dots{display:inline-flex;gap:4px;align-items:center;}
.dots span{width:6px;height:6px;border-radius:50%;background:white;animation:dot .8s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

// STATE
let selectedLesson = 1;
let questions = [];
let currentQ = 0;
let score = 0;
let correctCount = 0;
let answered = false;
let scores = [];

// RENDER LESSON SELECTOR
function renderLessonSel(){
  const g = document.getElementById('ls-grid');
  g.innerHTML = LESSONS.map(l =>
    `<button class="ls-btn ${l.num===selectedLesson?'active':''}" onclick="selectLesson(${l.num})">${l.num}</button>`
  ).join('');
}

function selectLesson(num){
  selectedLesson = num;
  renderLessonSel();
  startExam();
}

function startExam(){
  const lesson = LESSONS.find(l => l.num === selectedLesson);
  // Shuffle & pick 10
  const shuffled = [...lesson.words].sort(()=>Math.random()-.5);
  questions = shuffled.slice(0, Math.min(10, shuffled.length));
  currentQ = 0; score = 0; correctCount = 0; answered = false; scores = [];
  document.getElementById('qcard').style.display = 'block';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('feedback').classList.remove('show','correct','partial','wrong');
  document.getElementById('next-btn').classList.remove('show');
  showQuestion();
  updateHeader();
}

function showQuestion(){
  if(currentQ >= questions.length){ showResult(); return; }
  const w = questions[currentQ];
  document.getElementById('q-num').textContent = `Sorag ${currentQ+1} / ${questions.length}`;
  document.getElementById('q-word').textContent = w.zh;
  document.getElementById('q-pinyin').textContent = w.py;
  document.getElementById('q-meaning').textContent = w.en;
  document.getElementById('q-type').textContent = w.type;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').disabled = false;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').className = 'submit-btn';
  document.getElementById('submit-btn').innerHTML = 'AI Baha Bersin 🤖';
  document.getElementById('feedback').classList.remove('show','correct','partial','wrong');
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('fb-example').style.display = 'none';
  answered = false;
  updateHeader();
}

function updateHeader(){
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-correct').textContent = correctCount;
  document.getElementById('h-q').textContent = `${currentQ}/${questions.length}`;
  document.getElementById('pbar').style.width = (currentQ/questions.length*100)+'%';
}

async function submitAnswer(){
  if(answered) return;
  const ans = document.getElementById('answer-input').value.trim();
  if(!ans){ alert('Sözlem ýaz!'); return; }
  const w = questions[currentQ];

  // Loading state
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  document.getElementById('submit-btn').className = 'submit-btn loading';
  document.getElementById('answer-input').disabled = true;

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 500,
        messages: [{
          role: "user",
          content: `You are an HSK 4 Chinese teacher grading a student's sentence.

The student was given the word: "${w.zh}" (${w.py}) meaning "${w.en}" (${w.type})

The student wrote this sentence in Chinese: "${ans}"

Please grade this sentence from 0-10 and give brief feedback in Turkmen language (Türkmen dili).

Respond ONLY in this exact JSON format (no markdown):
{
  "score": <number 0-10>,
  "level": "correct" or "partial" or "wrong",
  "feedback_tk": "<brief feedback in Turkmen, 1-2 sentences>",
  "example_zh": "<a good example sentence using the word>",
  "example_en": "<English translation of your example>"
}`
        }]
      })
    });
    const data = await resp.json();
    const raw = data.content.map(c=>c.text||'').join('');
    const clean = raw.replace(/```json|```/g,'').trim();
    const result = JSON.parse(clean);

    // Show feedback
    answered = true;
    const qScore = Math.round(result.score * 10);
    score += qScore;
    if(result.level === 'correct') correctCount++;
    scores.push(qScore);

    const fb = document.getElementById('feedback');
    fb.className = 'feedback show ' + result.level;

    const icons = {correct:'✅', partial:'⚡', wrong:'❌'};
    const titles = {correct:'Dogry!', partial:'Ýarym dogry', wrong:'Gaýtadan synap gör'};
    document.getElementById('fb-icon').textContent = icons[result.level];
    document.getElementById('fb-title').textContent = titles[result.level];
    document.getElementById('fb-score').textContent = '+'+qScore;
    document.getElementById('fb-text').textContent = result.feedback_tk;

    if(result.example_zh){
      document.getElementById('fb-example').style.display = 'block';
      document.getElementById('fb-ex-zh').textContent = result.example_zh;
      document.getElementById('fb-ex-en').textContent = result.example_en;
    }

    document.getElementById('next-btn').classList.add('show');
    document.getElementById('next-btn').textContent = currentQ+1 >= questions.length ? '📊 Netijeleri Gör' : 'Indiki Sorag →';
    updateHeader();

  } catch(e) {
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').className = 'submit-btn';
    document.getElementById('submit-btn').innerHTML = 'AI Baha Bersin 🤖';
    document.getElementById('answer-input').disabled = false;
    alert('Ýalňyşlyk boldy, täzeden synap gör.');
  }
}

function nextQuestion(){
  currentQ++;
  showQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showResult(){
  document.getElementById('qcard').style.display = 'none';
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');

  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const total = questions.length * 100;
  const pct = Math.round(score / total * 100);
  document.getElementById('r-score').textContent = pct;

  const grade = pct>=90?'🥇 Ajaýyp!' : pct>=75?'🥈 Gowy!' : pct>=60?'🥉 Orta' : '📚 Has köp öwren';
  const gradeColor = pct>=90?'var(--green)' : pct>=75?'var(--gold)' : pct>=60?'var(--dark)' : 'var(--red)';
  const g = document.getElementById('r-grade');
  g.textContent = grade;
  g.style.background = gradeColor+'22';
  g.style.color = gradeColor;
  g.style.border = `1.5px solid ${gradeColor}44`;

  document.getElementById('r-correct').textContent = correctCount;
  document.getElementById('r-wrong').textContent = questions.length - correctCount;
  const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : 0;
  document.getElementById('r-avg').textContent = avg;
  document.getElementById('r-lesson').textContent = selectedLesson;

  document.getElementById('pbar').style.width = '100%';
  document.getElementById('h-score').textContent = score;
}

function restart(){
  startExam();
  window.scrollTo({top:0,behavior:'smooth'});
}

// INIT
renderLessonSel();
startExam();
</script>
